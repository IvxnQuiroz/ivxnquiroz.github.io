<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Un mensaje para ti ✨</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
}

.contenedor{
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:30px;
    border-radius:25px;
    width:85%;
    max-width:500px;
    box-shadow:0 0 30px rgba(255,255,255,0.1);
}

h1{
    color:#ffd700;
}

#mensaje{
    font-size:18px;
    line-height:1.7;
    margin:20px 0;
}

button{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:12px 24px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<div class="contenedor">
<h1>✨ Hola ✨</h1>

<p id="mensaje">
Si estás leyendo esto, es porque quería dejarte algo especial.<br><br>
Presiona el botón y descubre pequeños mensajes guardados para ti. 💌
</p>

<button onclick="nuevoMensaje()">
💌 Descubrir mensaje
</button>
</div>

<script>
const mensajes = [
"Dada la inmensidad del tiempo, coincidir contigo parece una hermosa casualidad. ✨",
"Entre millones de caminos posibles, la vida permitió que nuestras historias se cruzaran. 🌙",
"Hay personas que llegan sin hacer ruido y terminan ocupando un lugar especial en los pensamientos. 🌸",
"Algunas presencias tienen la extraña capacidad de volver más bonitos los días comunes. ☀️",
"Si el universo está hecho de coincidencias, entonces tú eres una de mis favoritas. ✨",
"No sé cuántas estrellas existen allá arriba, pero sé que algunas personas brillan incluso más cerca. 🌟",
"Hay momentos que se olvidan y personas que permanecen. 🌹",
"Qué curioso que entre tantas personas en el mundo, algunas logren llamar nuestra atención de una forma tan especial. 💫",
"La belleza de ciertas personas no está en lo que muestran, sino en lo que inspiran. 🌷",
"Gracias por existir en este mismo rincón del universo. ✨"
];

function nuevoMensaje(){
const aleatorio=Math.floor(Math.random()*mensajes.length);
document.getElementById("mensaje").innerText=mensajes[aleatorio];
}
</script>

</body>
</html>
