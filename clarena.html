<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Clarena</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:radial-gradient(circle at center,#0b1026,#02030a 80%);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial,Helvetica,sans-serif;
}

canvas{
    position:fixed;
    inset:0;
}

#nombre{
    position:absolute;
    color:white;
    font-size:58px;
    font-weight:bold;
    text-shadow:
    0 0 10px #fff,
    0 0 20px #ff8fc8,
    0 0 40px #ff4fa3;
    animation:latir 2s infinite;
}

@keyframes latir{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}
</style>

</head>

<body>

<canvas id="galaxia"></canvas>

<div id="nombre">
Clarena
</div>

<script>

const canvas=document.getElementById("galaxia");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();

window.addEventListener("resize",resize);

const estrellas=[];
const mensajes = [
"Dada la inmensidad del tiempo, coincidir contigo parece una hermosa casualidad. ✨",
"Entre millones de caminos posibles, la vida permitió que nuestras historias se cruzaran. 🌙",
"Hay personas que llegan sin hacer ruido y terminan ocupando un lugar especial en los pensamientos. 🌸",
"Algunas presencias tienen la extraña capacidad de volver más bonitos los días comunes. ☀️",
"Si el universo está hecho de coincidencias, entonces tú eres una de mis favoritas. ✨",
"No sé cuántas estrellas existen allá arriba, pero sé que algunas personas brillan incluso más cerca. 🌟",
"Hay momentos que se olvidan y personas que permanecen. 🌹",
"Qué curioso que entre tantas personas en el mundo, algunas logren llamar nuestra atención de una forma tan especial. 💫",
"La belleza de ciertas personas no está en lo que muestran, sino en lo que inspiran. 🌷",
"Compartir este mismo instante del universo contigo ya es algo extraordinario. ✨",
"Que nunca te falten motivos para sonreír. 😊",
"Hoy puede ser un gran día, incluso por las razones más pequeñas. 🌻",
"Recuerda que eres más fuerte de lo que imaginas. 💪",
"Hay una versión de ti en el futuro orgullosa de no haberse rendido. 🌅",
"Cada día trae una oportunidad nueva para sorprenderte. 🌈",
"Las cosas bonitas suelen llegar sin avisar. 🌸",
"Confía en el proceso, incluso cuando no veas el camino completo. 🌙",
"Tu forma de ser deja huellas más bonitas de lo que crees. ✨",
"El mundo necesita más personas auténticas como tú. 🌷",
"Que hoy encuentres algo que te haga feliz. ☀️",
"Las estrellas también atraviesan la oscuridad para brillar. 🌟",
"Algunas sonrisas tienen el poder de cambiar un día entero. 😊",
"No subestimes el valor de tu presencia. 🌹",
"La calma también es una forma de avanzar. 🍃",
"Hay belleza en las pequeñas cosas que a veces pasan desapercibidas. 🌺",
"Los mejores capítulos suelen comenzar cuando menos lo esperamos. 📖",
"Siempre hay algo bueno esperándote más adelante. 🌄",
"Cada amanecer es una página en blanco. ✨",
"No olvides apreciar lo lejos que has llegado. 🌻",
"Tu historia merece ser contada. 📚",
"El cielo nunca repite exactamente la misma nube. ☁️",
"Las coincidencias más bonitas suelen ser inesperadas. 🌙",
"A veces una conversación cambia más de lo que imaginamos. 💫",
"Las personas especiales suelen descubrirse poco a poco. 🌸",
"Hay silencios que también dicen cosas bonitas. 🍂",
"Los recuerdos más valiosos suelen nacer en momentos simples. 🌷",
"El tiempo tiene formas curiosas de unir caminos. ✨",
"Siempre habrá algo nuevo por descubrir. 🌎",
"Algunas miradas guardan historias enteras. 🌙",
"El universo está lleno de posibilidades. 🌌",
"Cada persona tiene algo único que ofrecer al mundo. 🌻",
"Que nunca pierdas tu esencia. 🌸",
"Hay días que merecen guardarse para siempre en la memoria. 📸",
"Las mejores cosas rara vez se pueden medir. ✨",
"Las palabras sinceras siempre encuentran su lugar. 💌",
"Las flores no compiten entre sí, simplemente florecen. 🌺",
"Los detalles pequeños suelen ser los más recordados. 🌷",
"El valor de una persona no depende de la opinión de los demás. 🌟",
"Las historias más bonitas todavía están por escribirse. 📖",
"Gracias por existir en este mismo rincón del universo. ✨"
];
const estrellasEspeciales = [];

for(let i=0;i<50;i++){

let angulo=Math.random()*Math.PI*2;
let distancia=40+Math.random()*240;

estrellasEspeciales.push({

angulo:angulo,
distancia:distancia,
radio:3+Math.random()*2,
mensaje:mensajes[i],
descubierta:false

});

}
for(let i=0;i<500;i++){

let angulo=Math.random()*Math.PI*2;
let distancia=Math.pow(Math.random(),0.5)*300;

estrellas.push({

x:canvas.width/2+Math.cos(angulo)*distancia,
y:canvas.height/2+Math.sin(angulo)*distancia,
r:Math.random()*2+0.3,
a:Math.random()

});

}

let giro = 0;

function animar(){

ctx.clearRect(0,0,canvas.width,canvas.height);

giro += 0.0015;

for(let s of estrellas){

let dx = s.x - canvas.width/2;
let dy = s.y - canvas.height/2;

let x = canvas.width/2 + dx*Math.cos(giro) - dy*Math.sin(giro);
let y = canvas.height/2 + dx*Math.sin(giro) + dy*Math.cos(giro);

ctx.beginPath();
ctx.arc(x,y,s.r,0,Math.PI*2);
ctx.fillStyle="rgba(255,255,255,"+s.a+")";
ctx.fill();

s.a += (Math.random()-0.5)*0.03;

if(s.a<0.2)s.a=0.2;
if(s.a>1)s.a=1;

}
}

for(let e of estrellasEspeciales){

let x=canvas.width/2+Math.cos(e.angulo+giro)*e.distancia;
let y=canvas.height/2+Math.sin(e.angulo+giro)*e.distancia;

ctx.beginPath();
ctx.arc(x,y,e.radio,0,Math.PI*2);

ctx.fillStyle=e.descubierta?"#ffd54f":"#66ccff";

ctx.shadowBlur=15;
ctx.shadowColor=ctx.fillStyle;

ctx.fill();

ctx.shadowBlur=0;

}

requestAnimationFrame(animar);

}

animar();

</script>

</body>
</html>
